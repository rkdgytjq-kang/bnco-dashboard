<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비엔코 · 26년 1분기 채널별 손익</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f14;
    --surface: #13181f;
    --surface2: #1a2030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8edf5;
    --text2: #8a95a8;
    --text3: #4a5568;
    --accent: #4f8ef7;
    --accent2: #6ee7b7;
    --warn: #f87171;
    --warn2: #fbbf24;
    --pos: #34d399;
    --neg: #f87171;
    --neu: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(12,15,20,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: baseline; gap: 14px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--accent); }
  .period { font-size: 11px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border2); padding: 3px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 10px; font-family: 'DM Mono', monospace; padding: 4px 10px; border-radius: 4px; border: 1px solid; letter-spacing: 0.5px; }
  .badge-conf { color: var(--warn2); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.06); }

  /* ── MAIN LAYOUT ── */
  .main { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 53px); }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky; top: 53px;
    height: calc(100vh - 53px);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .nav-section { margin-bottom: 4px; }
  .nav-label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); padding: 12px 20px 4px;
    font-family: 'DM Mono', monospace;
  }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    color: var(--text2);
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); border-left-color: var(--border2); }
  .nav-item.active { background: rgba(79,142,247,0.08); color: var(--accent); border-left-color: var(--accent); }
  .nav-item-name { font-size: 12px; }
  .nav-om {
    font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 1px 6px; border-radius: 3px; min-width: 52px; text-align: right;
  }
  .om-pos { color: var(--pos); background: rgba(52,211,153,0.1); }
  .om-neg { color: var(--neg); background: rgba(248,113,113,0.1); }
  .om-neu { color: var(--warn2); background: rgba(251,191,36,0.1); }
  .nav-group-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px; cursor: pointer;
    color: var(--text2); transition: all 0.15s;
  }
  .nav-group-btn:hover { color: var(--text); }
  .nav-group-btn.open { color: var(--text); }
  .nav-group-arrow { font-size: 8px; transition: transform 0.2s; }
  .nav-group-btn.open .nav-group-arrow { transform: rotate(90deg); }
  .nav-group-title { font-size: 11px; font-weight: 500; letter-spacing: 0.5px; }
  .nav-group-count { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--text3); margin-left: auto; }
  .nav-children { display: none; }
  .nav-children.open { display: block; }

  /* ── CONTENT ── */
  .content { padding: 28px 32px; overflow-y: auto; }

  /* ── SUMMARY CARDS ── */
  .summary-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 28px;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
    position: relative; overflow: hidden;
  }
  .summary-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0.6;
  }
  .sc-label { font-size: 10px; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
  .sc-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
  .sc-sub { font-size: 11px; color: var(--text2); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .sc-value.pos { color: var(--pos); }
  .sc-value.neg { color: var(--neg); }
  .sc-value.neu { color: var(--neu); }

  /* ── SECTION TITLE ── */
  .section-title {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .section-title h2 { font-size: 14px; font-weight: 500; color: var(--text); }
  .section-title .stag {
    font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 1px;
    color: var(--accent); background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.2);
    padding: 2px 8px; border-radius: 3px;
  }
  .divider { flex: 1; height: 1px; background: var(--border); }

  /* ── CHANNEL DETAIL CARD ── */
  .channel-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .channel-card:hover { border-color: var(--border2); }
  .channel-header {
    display: grid; grid-template-columns: 1fr repeat(4, 140px);
    align-items: center; padding: 14px 20px;
    cursor: pointer; gap: 8px;
  }
  .channel-name-wrap { display: flex; align-items: center; gap: 10px; }
  .ch-brand { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--text3); background: var(--surface2); padding: 2px 6px; border-radius: 3px; letter-spacing: 0.5px; }
  .ch-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .metric-col { text-align: right; }
  .metric-main { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .metric-pct { font-size: 10px; font-family: 'DM Mono', monospace; margin-top: 2px; }
  .metric-pct.pos { color: var(--pos); }
  .metric-pct.neg { color: var(--neg); }
  .metric-pct.neu { color: var(--warn2); }

  /* bar sparkline */
  .bar-wrap { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .bar-track { flex: 1; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .bar-pos { background: linear-gradient(90deg, var(--pos), var(--accent2)); }
  .bar-neg { background: var(--neg); }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    display: none; border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
    padding: 20px 20px 20px;
  }
  .detail-panel.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .detail-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); margin-bottom: 10px; font-family: 'DM Mono', monospace; }

  .waterfall { display: flex; flex-direction: column; gap: 4px; }
  .wf-row { display: flex; align-items: center; gap: 10px; }
  .wf-label { font-size: 11px; color: var(--text2); width: 130px; flex-shrink: 0; }
  .wf-bar-area { flex: 1; display: flex; align-items: center; position: relative; height: 20px; }
  .wf-bar {
    height: 14px; border-radius: 2px;
    position: absolute;
    transition: width 0.5s ease;
    min-width: 2px;
  }
  .wf-bar.revenue { background: rgba(79,142,247,0.6); }
  .wf-bar.cogs { background: rgba(248,113,113,0.5); }
  .wf-bar.fee { background: rgba(251,191,36,0.4); }
  .wf-bar.adv { background: rgba(248,113,113,0.35); }
  .wf-bar.logi { background: rgba(248,113,113,0.3); }
  .wf-bar.labor { background: rgba(167,139,250,0.5); }
  .wf-bar.other { background: rgba(167,139,250,0.35); }
  .wf-bar.gp { background: rgba(52,211,153,0.6); }
  .wf-bar.ci { background: rgba(52,211,153,0.45); }
  .wf-bar.om-pos { background: rgba(52,211,153,0.8); }
  .wf-bar.om-neg { background: rgba(248,113,113,0.8); }
  .wf-value { font-family: 'DM Mono', monospace; font-size: 10px; width: 80px; text-align: right; flex-shrink: 0; }
  .wf-value.pos { color: var(--pos); }
  .wf-value.neg { color: var(--neg); }
  .wf-divider { border: none; border-top: 1px dashed var(--border2); margin: 2px 0; }

  .indirect-box {
    background: var(--surface2); border-radius: 8px; padding: 14px 16px;
  }
  .indirect-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .indirect-row:last-child { border: none; }
  .indirect-key { font-size: 11px; color: var(--text2); }
  .indirect-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text); }

  /* ── TABLE VIEW ── */
  .table-wrap { overflow-x: auto; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: var(--surface2); font-size: 10px; font-weight: 500;
    color: var(--text2); text-align: right; padding: 8px 12px;
    letter-spacing: 0.5px; white-space: nowrap;
    position: sticky; top: 0; border-bottom: 1px solid var(--border2);
  }
  th:first-child, th:nth-child(2) { text-align: left; }
  td {
    padding: 9px 12px; border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 11px; text-align: right;
    white-space: nowrap;
  }
  td:first-child { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; color: var(--text2); }
  td:nth-child(2) { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); text-align: left; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .td-pos { color: var(--pos); }
  .td-neg { color: var(--neg); }
  .td-neu { color: var(--warn2); }
  tfoot td { background: var(--surface2); font-weight: 600; border-top: 1px solid var(--border2); color: var(--text); }

  /* ── VIEW TOGGLE ── */
  .view-toggle {
    display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); 
    border: 1px solid var(--border); border-radius: 8px; padding: 4px; width: fit-content;
  }
  .view-btn {
    font-size: 11px; padding: 6px 14px; border-radius: 5px; border: none;
    cursor: pointer; background: transparent; color: var(--text2); font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

  /* ── WATERFALL CHART ── */
  .wf-chart-area { width: 100%; }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 11px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: rgba(79,142,247,0.12); border-color: rgba(79,142,247,0.4); color: var(--accent); }
  .filter-btn.all { background: rgba(79,142,247,0.08); border-color: rgba(79,142,247,0.25); color: var(--accent); }

  /* ── COL HEADERS ── */
  .col-header {
    display: grid; grid-template-columns: 1fr repeat(4, 140px);
    padding: 6px 20px 10px; gap: 8px;
  }
  .col-h { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); text-align: right; font-family: 'DM Mono', monospace; }
  .col-h:first-child { text-align: left; }

  /* chart area */
  .chart-bars { display: flex; gap: 3px; align-items: flex-end; height: 100px; margin: 12px 0 4px; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .chart-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
  .chart-bar-label { font-size: 8px; color: var(--text3); font-family: 'DM Mono', monospace; text-align: center; white-space: nowrap; overflow: hidden; max-width: 40px; text-overflow: ellipsis; }

  /* SCROLL */
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* FOOTER */
  .footer {
    margin-top: 40px; padding: 20px 0; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    color: var(--text3); font-size: 10px; font-family: 'DM Mono', monospace;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; top: 0; display: flex; flex-wrap: wrap; padding: 8px; gap: 4px; }
    .summary-grid { grid-template-columns: repeat(2,1fr); }
    .channel-header { grid-template-columns: 1fr repeat(2,120px); }
    .metric-col:nth-child(3), .metric-col:nth-child(4) { display: none; }
    .detail-grid { grid-template-columns: 1fr; }
    .col-header { grid-template-columns: 1fr repeat(2,120px); }
    .col-h:nth-child(3), .col-h:nth-child(4) { display: none; }
  }
</style>

// 파생 계산
CHANNELS.forEach(d => {
  d.net_rev = d.rev - (d.ret || 0);
  d.gp = d.net_rev - d.cogs;
  d.gp_pct = d.net_rev !== 0 ? d.gp / d.net_rev : 0;
  d.direct = (d.fee||0) + (d.adv||0) + (d.opfee||0) + (d.logi||0) + (d.opfee2||0);
  d.ci_pct = d.net_rev !== 0 ? d.ci / d.net_rev : 0;
  d.fixed_total = d.labor + d.ofixed;
  d.om_pct = d.net_rev !== 0 ? d.om / d.net_rev : 0;
});

const GROUPS = [...new Set(CHANNELS.map(d => d.grp))];

// ── UTILS ──────────────────────────────────────────────────────────────────
const fmt = n => {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e8) return sign + (abs/1e8).toFixed(1) + '억';
  if (abs >= 1e4) return sign + Math.round(abs/1e4).toLocaleString() + '만';
  return n.toLocaleString();
};
const fmtM = n => {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e8) return sign + (abs/1e8).toFixed(2) + '억';
  return sign + Math.round(abs/1e4).toLocaleString() + '만';
};
const pct = v => (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%';
const pctClass = v => v > 0.05 ? 'pos' : v < 0 ? 'neg' : 'neu';
const omClass = v => v > 0.05 ? 'om-pos' : v < 0 ? 'om-neg' : 'om-neu';

// ── STATE ──────────────────────────────────────────────────────────────────
let activeGrp = 'ALL';
let openCards = new Set();
let viewMode = 'cards'; // 'cards' | 'table'

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  
  // 전체 합계
  const totRev = CHANNELS.reduce((s,d) => s+d.rev, 0);
  const totOM = CHANNELS.reduce((s,d) => s+d.om, 0);
  
  let html = `
    <div class="nav-section">
      <div class="nav-label">개요</div>
      <div class="nav-item ${activeGrp==='ALL'?'active':''}" onclick="setGrp('ALL')">
        <span class="nav-item-name">전체 채널</span>
        <span class="nav-om ${omClass(totOM/totRev)}">${pct(totOM/totRev)}</span>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">세그먼트</div>
  `;
  
  GROUPS.forEach(grp => {
    const chs = CHANNELS.filter(d => d.grp === grp);
    const gRev = chs.reduce((s,d) => s+d.rev, 0);
    const gOM = chs.reduce((s,d) => s+d.om, 0);
    const gPct = gRev !== 0 ? gOM/gRev : 0;
    const isOpen = activeGrp === grp;
    html += `
      <div>
        <div class="nav-group-btn ${isOpen?'open':''}" onclick="toggleNav('${grp}')">
          <span class="nav-group-arrow">▶</span>
          <span class="nav-group-title">${grp}</span>
          <span class="nav-om ${omClass(gPct)}" style="margin-left:auto">${pct(gPct)}</span>
        </div>
        <div class="nav-children ${isOpen?'open':''}" id="nav-ch-${grp.replace(/ /g,'_')}">
          ${chs.map(ch => `
            <div class="nav-item ${activeGrp===ch.ch?'active':''}" onclick="setGrp('${ch.ch}')" style="padding-left:32px">
              <span class="nav-item-name">${ch.ch}</span>
              <span class="nav-om ${omClass(ch.om_pct)}">${pct(ch.om_pct)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });

  html += `</div>`;
  sidebar.innerHTML = html;
}

function toggleNav(grp) {
  const key = grp.replace(/ /g,'_');
  const el = document.getElementById(`nav-ch-${key}`);
  const btn = el.previousElementSibling;
  el.classList.toggle('open');
  btn.classList.toggle('open');
}

function setGrp(grp) {
  activeGrp = grp;
  buildSidebar();
  renderContent();
}

// ── SUMMARY CARDS ─────────────────────────────────────────────────────────
function buildSummary(channels) {
  const rev = channels.reduce((s,d) => s+d.rev, 0);
  const gp = channels.reduce((s,d) => s+d.gp, 0);
  const ci = channels.reduce((s,d) => s+d.ci, 0);
  const om = channels.reduce((s,d) => s+d.om, 0);
  const gpP = rev ? gp/rev : 0;
  const ciP = rev ? ci/rev : 0;
  const omP = rev ? om/rev : 0;
  return `
    <div class="summary-grid">
      <div class="summary-card">
        <div class="sc-label">매출액</div>
        <div class="sc-value neu">${fmtM(rev)}</div>
        <div class="sc-sub">${channels.length}개 채널</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">매출총이익 (GP)</div>
        <div class="sc-value ${gp>=0?'pos':'neg'}">${fmtM(gp)}</div>
        <div class="sc-sub">GP율 ${pct(gpP)}</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">공헌이익 (CI)</div>
        <div class="sc-value ${ci>=0?'pos':'neg'}">${fmtM(ci)}</div>
        <div class="sc-sub">CI율 ${pct(ciP)}</div>
      </div>
      <div class="summary-card">
        <div class="sc-label">영업이익 (OM)</div>
        <div class="sc-value ${om>=0?'pos':'neg'}">${fmtM(om)}</div>
        <div class="sc-sub">OM율 ${pct(omP)}</div>
      </div>
    </div>
  `;
}

// ── WATERFALL ROW ─────────────────────────────────────────────────────────
function wfRow(label, value, cls, maxVal, indent=false) {
  const barW = maxVal > 0 ? Math.min(100, Math.abs(value)/maxVal*100) : 0;
  const sign = value >= 0 ? '+' : '';
  return `
    <div class="wf-row">
      <span class="wf-label" style="${indent?'padding-left:12px;font-size:10px;':''}">${label}</span>
      <div class="wf-bar-area">
        <div class="wf-bar ${cls}" style="width:${barW}%;left:${value>=0?0:100-barW}%"></div>
      </div>
      <span class="wf-value ${value>=0?'pos':'neg'}">${fmt(value)}</span>
    </div>
  `;
}

          <div class="metric-pct ${pctClass(d.gp_pct)}">GP ${pct(d.gp_pct)}</div>

            <span style="color:${d.ci>=0?'var(--pos)':'var(--neg)'}">${fmtM(d.ci)}</span>

          <div class="metric-pct ${pctClass(d.ci_pct)}">CI ${pct(d.ci_pct)}</div>
        </div>
        <div class="metric-col">
          <div class="metric-main">
            <span style="color:${d.om>=0?'var(--pos)':'var(--neg)'}">${fmtM(d.om)}</span>

// ── TABLE VIEW ─────────────────────────────────────────────────────────────
function buildTable(channels) {
  const totRev = channels.reduce((s,d)=>s+d.rev,0);
  const totGP = channels.reduce((s,d)=>s+d.gp,0);
  const totCI = channels.reduce((s,d)=>s+d.ci,0);
  const totFixed = channels.reduce((s,d)=>s+d.fixed_total,0);
  const totOM = channels.reduce((s,d)=>s+d.om,0);

  const rows = channels.map(d => `
    <tr>
      <td>${d.grp}</td>
      <td>${d.ch}</td>
      <td class="${d.rev>=0?'td-neu':'td-neg'}">${fmt(d.rev)}</td>
      <td class="${pctClass(d.gp_pct)}">${fmt(d.gp)}</td>
      <td class="${pctClass(d.gp_pct)}">${pct(d.gp_pct)}</td>
      <td class="${pctClass(d.ci_pct)}">${fmt(d.ci)}</td>
      <td class="${pctClass(d.ci_pct)}">${pct(d.ci_pct)}</td>
      <td style="color:var(--text2)">${fmt(d.fixed_total)}</td>
      <td class="${pctClass(d.om_pct)}">${fmt(d.om)}</td>
      <td class="${pctClass(d.om_pct)}">${pct(d.om_pct)}</td>
    </tr>
  `).join('');

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>세그먼트</th>
            <th>채널</th>
            <th>매출액</th>
            <th>GP</th>
            <th>GP율</th>
            <th>CI</th>
            <th>CI율</th>
            <th>간접비</th>
            <th>OM</th>
            <th>OM율</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr>
            <td colspan="2">합계 (${channels.length}채널)</td>
            <td class="td-neu">${fmt(totRev)}</td>
            <td class="${pctClass(totGP/totRev)}">${fmt(totGP)}</td>
            <td class="${pctClass(totGP/totRev)}">${pct(totRev?totGP/totRev:0)}</td>
            <td class="${pctClass(totCI/totRev)}">${fmt(totCI)}</td>
            <td class="${pctClass(totCI/totRev)}">${pct(totRev?totCI/totRev:0)}</td>
            <td style="color:var(--text2)">${fmt(totFixed)}</td>
            <td class="${pctClass(totOM/totRev)}">${fmt(totOM)}</td>
            <td class="${pctClass(totOM/totRev)}">${pct(totRev?totOM/totRev:0)}</td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────
function renderContent() {
  const root = document.getElementById('app-root');

  // 필터링
  let channels;
  if (activeGrp === 'ALL') channels = CHANNELS;
  else if (GROUPS.includes(activeGrp)) channels = CHANNELS.filter(d => d.grp === activeGrp);
  else channels = CHANNELS.filter(d => d.ch === activeGrp);

  const title = activeGrp === 'ALL' ? '전체 채널' : activeGrp;
  const stag = activeGrp === 'ALL' ? 'ALL CHANNELS' : GROUPS.includes(activeGrp) ? 'SEGMENT' : 'CHANNEL';

  const maxRev = Math.max(...channels.map(d => Math.abs(d.rev)));

  // GROUP FILTER BTNs (전체 뷰일 때만)
  let filterBar = '';
  if (activeGrp === 'ALL') {
    filterBar = `
      <div class="filter-bar">
        <button class="filter-btn all" onclick="setGrp('ALL')">전체</button>
        ${GROUPS.map(g => `<button class="filter-btn" onclick="setGrp('${g}')">${g}</button>`).join('')}
      </div>
    `;
  }

  let bodyContent = '';
  if (viewMode === 'table') {
    bodyContent = buildTable(channels);
  } else {
    // cards
    let cardHtml = '';
    if (activeGrp === 'ALL') {
      GROUPS.forEach(grp => {
        const chs = channels.filter(d => d.grp === grp);
        if (!chs.length) return;
        const gRev = chs.reduce((s,d)=>s+d.rev,0);
        const gOM = chs.reduce((s,d)=>s+d.om,0);
        cardHtml += `
          <div style="margin-bottom:28px">
            <div class="section-title">
              <h2>${grp}</h2>
              <span class="stag">${stag}</span>
              <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text2)">OM ${pct(gRev?gOM/gRev:0)} · ${chs.length}채널</span>
              <div class="divider"></div>
            </div>
            <div class="col-header">
              <div class="col-h">채널</div>
              <div class="col-h">매출액</div>
              <div class="col-h">GP</div>
              <div class="col-h">CI</div>
              <div class="col-h">OM</div>
            </div>
            ${chs.map(d => buildCard(d, maxRev)).join('')}
          </div>
        `;
      });
    } else {
      const grpLabel = GROUPS.includes(activeGrp) ? activeGrp : channels[0]?.grp || '';
      cardHtml = `
        <div class="col-header">
          <div class="col-h">채널</div>
          <div class="col-h">매출액</div>
          <div class="col-h">GP</div>
          <div class="col-h">CI</div>
          <div class="col-h">OM</div>
        </div>
        ${channels.map(d => buildCard(d, maxRev)).join('')}
      `;
    }
    bodyContent = cardHtml;
  }

  root.innerHTML = `
    ${buildSummary(channels)}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="section-title" style="margin:0">
        <h2>${title}</h2>
        <span class="stag">${stag}</span>
        <div class="divider" style="width:60px"></div>
      </div>
      <div class="view-toggle">
        <button class="view-btn ${viewMode==='cards'?'active':''}" onclick="setView('cards')">카드뷰</button>
        <button class="view-btn ${viewMode==='table'?'active':''}" onclick="setView('table')">테이블뷰</button>
      </div>
    </div>
    ${filterBar}
    ${bodyContent}
    <div class="footer">
      <span>비엔코 전략지원본부 · 26년 1분기 가결산</span>
      <span>CONFIDENTIAL — 내부 공유용</span>
    </div>
  `;
}

function toggleCard(ch) {
  if (openCards.has(ch)) openCards.delete(ch);
  else openCards.add(ch);
  renderContent();
}

function setView(mode) {
  viewMode = mode;
  renderContent();
}

// ── INIT ──────────────────────────────────────────────────────────────────
buildSidebar();
renderContent();
</script>
</body>
</html>
